<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{main/layout}">
    <head>
        <title>Sales List</title>
        <th:block layout:fragment="head">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/webjars/bootstrap/5.3.7/css/bootstrap.min.css">
        <link rel="stylesheet" href="/webjars/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/shared.css}">
        </th:block>
    </head>
    <th:block layout:fragment="page-title">Sales Management</th:block>
<div layout:fragment="content">
    <div class="container">
        <div class="header">
            <h1>Sales Management</h1>
        </div>

        <!-- ── Filter Form ── -->
        <form method="get" th:action="@{/sales}" class="mb-4">
            <div class="row g-2 align-items-end">

                <!-- Keyword -->
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Contract ID</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <input type="text" name="keyword"
                               th:value="${filter != null ? filter.keyword : ''}"
                               class="form-control border-start-0 shadow-none"
                               placeholder="Search by contract ID...">
                    </div>
                </div>

                <!-- Status -->
                <div class="col-md-2">
                    <label class="form-label fw-semibold">Status</label>
                    <select name="status" class="form-select shadow-none">
                        <option value="">All</option>
                        <option value="PENDING"
                                th:selected="${filter != null and filter.status == 'PENDING'}">Pending</option>
                        <option value="APPROVED"
                                th:selected="${filter != null and filter.status == 'APPROVED'}">Approved</option>
                        <option value="REJECTED"
                                th:selected="${filter != null and filter.status == 'REJECTED'}">Rejected</option>
                    </select>
                </div>

                <!-- Start Date -->
                <div class="col-md-2">
                    <label class="form-label fw-semibold">From</label>
                    <input type="date" name="startDate" class="form-control shadow-none"
                           th:value="${filter != null and filter.startDate != null ?
                                       #dates.format(filter.startDate, 'yyyy-MM-dd') : ''}">
                </div>

                <!-- End Date -->
                <div class="col-md-2">
                    <label class="form-label fw-semibold">To</label>
                    <input type="date" name="endDate" class="form-control shadow-none"
                           th:value="${filter != null and filter.endDate != null ?
                                       #dates.format(filter.endDate, 'yyyy-MM-dd') : ''}">
                </div>

                <!-- Buttons -->
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fa-solid fa-filter me-1"></i> Filter
                    </button>
                    <a th:href="@{/sales}" class="btn btn-outline-secondary w-100">
                        <i class="fa-solid fa-xmark me-1"></i> Clear
                    </a>
                </div>

            </div>
        </form>

        <!-- ── Table ── -->
        <div class="table-wrapper">
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Contract ID</th>
                        <th>Agent</th>
                        <th>Status</th>
                        <th>Date of Creation</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${saleslist}">
                        <td th:text="${s.contractId}"></td>
                        <td th:text="${s.agent.username}"></td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="${#strings.toLowerCase(s.status) == 'pending'  ? 'status-pending'  :
                                                  (#strings.toLowerCase(s.status) == 'approved' ? 'status-approved' :
                                                  (#strings.toLowerCase(s.status) == 'rejected' ? 'status-rejected' : ''))}"
                                  th:text="${s.status}">
                            </span>
                        </td>
                        <td th:text="${#temporals.format(s.uploadedAt, 'dd MMM yyyy')}"></td>
                        <td>
                            <div class="actions">
                                <a class="action-btn info-btn"
                                   th:href="@{/agent_sale(saleId=${s.id})}"
                                   title="View" style="text-decoration:none">
                                    <i class="fa-regular fa-eye"></i>
                                </a>
                            </div>
                        </td>
                    </tr>

                    <!-- Empty state -->
                    <tr th:if="${#lists.isEmpty(saleslist)}">
                        <td colspan="5" class="text-center text-muted py-4">
                            <i class="fa-solid fa-inbox fa-2x mb-2 d-block"></i>
                            No sales found.
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- ── Pagination — carries ALL filter params ── -->
            <div class="pagination-wrapper" th:if="${totalPages.length > 1}">

                <a class="page-btn"
                   th:classappend="${currentPage == 0} ? 'disabled'"
                   th:href="@{/sales(page=${currentPage - 1}, size=5,
                             keyword=${filter.keyword},
                             status=${filter.status},
                             startDate=${filter.startDate != null ? #dates.format(filter.startDate,'yyyy-MM-dd') : ''},
                             endDate=${filter.endDate   != null ? #dates.format(filter.endDate,  'yyyy-MM-dd') : ''})}">
                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                </a>

                <th:block th:each="p, status : ${totalPages}">
                    <a class="page-btn"
                       th:classappend="${status.index == currentPage} ? 'active'"
                       th:href="@{/sales(page=${status.index}, size=5,
                                 keyword=${filter.keyword},
                                 status=${filter.status},
                                 startDate=${filter.startDate != null ? #dates.format(filter.startDate,'yyyy-MM-dd') : ''},
                                 endDate=${filter.endDate   != null ? #dates.format(filter.endDate,  'yyyy-MM-dd') : ''})}"
                       th:text="${status.index + 1}">
                    </a>
                </th:block>

                <a class="page-btn"
                   th:classappend="${currentPage == totalPages.length - 1} ? 'disabled'"
                   th:href="@{/sales(page=${currentPage + 1}, size=5,
                             keyword=${filter.keyword},
                             status=${filter.status},
                             startDate=${filter.startDate != null ? #dates.format(filter.startDate,'yyyy-MM-dd') : ''},
                             endDate=${filter.endDate   != null ? #dates.format(filter.endDate,  'yyyy-MM-dd') : ''})}">
                    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                </a>

            </div>

            <p class="page-info text-center"
               th:text="'Page ' + (${currentPage + 1}) + ' of ' + ${totalPages.length}"
               th:if="${totalPages.length > 1}">
            </p>
        </div>

    </div>
</div>

<th:block layout:fragment="scripts">
    <script></script>
</th:block>
</body>
</html>
