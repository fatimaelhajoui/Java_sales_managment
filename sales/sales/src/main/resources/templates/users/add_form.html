<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Add New User</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
        <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
        }

        .form-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 680px;
            padding: 48px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            margin-bottom: 36px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f0f0f0;
        }

        .form-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #111;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        .error-banner {
            padding: 12px 16px;
            margin-bottom: 20px;
            background: #fef2f2;
            border: 1.5px solid #fca5a5;
            border-radius: 8px;
            color: #dc2626;
            font-size: 14px;
            font-weight: 500;
        }
        .form-header p {
            font-size: 14px;
            color: #888;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label.field-label {
            font-size: 13px;
            font-weight: 500;
            color: #444;
        }

        .form-group input[type="text"],
        .form-group input[type="password"],
        .form-group select {
            width: 100%;
            padding: 10px 13px;
            font-size: 14px;
            font-family: inherit;
            border: 1.5px solid #e4e4e7;
            border-radius: 8px;
            background: #fafafa;
            color: #111;
            transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #2563eb;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
        }

        /* Custom select */
        .select-wrapper {
            position: relative;
        }

        .select-wrapper select {
            appearance: none;
            -webkit-appearance: none;
            padding-right: 36px;
            cursor: pointer;
        }

        .select-wrapper::after {
            content: '';
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 5px solid #888;
            pointer-events: none;
        }

        /* Radio buttons styled as toggle cards */
        .radio-group {
            display: flex;
            gap: 10px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .radio-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 10px 14px;
            border: 1.5px solid #e4e4e7;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            background: #fafafa;
            transition: all 0.18s ease;
            user-select: none;
        }

        .radio-option label::before {
            content: '';
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            background: white;
            flex-shrink: 0;
            transition: all 0.18s ease;
        }

        /* Active option — green */
        .radio-option.is-active input[type="radio"]:checked + label {
            border-color: #16a34a;
            background: #f0fdf4;
            color: #16a34a;
        }

        .radio-option.is-active input[type="radio"]:checked + label::before {
            border-color: #16a34a;
            background: #16a34a;
            box-shadow: inset 0 0 0 3px white;
        }

        .radio-option.is-active label:hover {
            border-color: #16a34a;
            color: #16a34a;
        }

        /* Inactive option — default blue */
        .radio-option input[type="radio"]:checked + label {
            border-color: #2563eb;
            background: #eff6ff;
            color: #2563eb;
        }

        .radio-option input[type="radio"]:checked + label::before {
            border-color: #2563eb;
            background: #2563eb;
            box-shadow: inset 0 0 0 3px white;
        }

        .radio-option label:hover {
            border-color: #94a3b8;
            color: #444;
        }

        .text-danger {
            color: #dc2626;
            font-size: 12px;
            font-style: italic;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #f0f0f0;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.18s ease;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
        }

        .btn-primary:active { transform: scale(0.98); }

        .btn-secondary {
            background: white;
            color: #444;
            border: 1.5px solid #e4e4e7;
            font-weight: 500;
        }

        .btn-secondary:hover {
            background: #f4f4f5;
        }

        /* ── Eye button ── */
        .input-eye-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-eye-wrapper input {
            padding-right: 42px !important;
        }

        .eye-btn {
            position: absolute;
            right: 11px;
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            color: #aaa;
            display: flex;
            align-items: center;
            border-radius: 4px;
            transition: color 0.15s;
            flex: unset;
            width: auto;
        }

        .eye-btn:hover { color: #555; }
        .eye-btn svg { width: 17px; height: 17px; display: block; }

        /* ── Strength bar ── */
        .strength-bar-track {
            height: 4px;
            background: #e4e4e7;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .strength-bar-fill {
            height: 100%;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease, background 0.3s ease;
        }

        .strength-label {
            font-size: 11px;
            font-weight: 500;
            color: #aaa;
            transition: color 0.3s;
        }

        /* ── Match hint ── */
        .match-hint {
            font-size: 12px;
            font-weight: 500;
            min-height: 16px;
        }

        .match-hint.ok   { color: #16a34a; }
        .match-hint.fail { color: #dc2626; }

        @media (max-width: 520px) {
            .form-container { padding: 28px 20px; }
            .form-grid { grid-template-columns: 1fr; }
        }
        </style>
    </head>

    <body>
        <div class="form-container">

            <div class="form-header">
                <h1>Add User</h1>
                <p>Create a new user in your organization</p>
            </div>

            <form id="UserForm" method="post" th:action="@{/users/save}" th:object="${appUser}">
            <div th:if="${errorMessage}" style="color:red;" th:text="${errorMessage}"></div>
                <div class="form-grid">

                  
                    <div class="form-group">
                        <label class="field-label" for="username">Username *</label>
                        <input type="text" id="username" th:field="*{username}" placeholder="e.g. john_doe">
                        <span class="text-danger" th:errors="*{username}"></span>
                    </div>

                    <div class="form-group">
                        <label class="field-label" for="mail">Email *</label>
                        <input type="text" id="mail" th:field="*{mail}" placeholder="john@company.com">
                        <span class="text-danger" th:errors="*{mail}"></span>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label class="field-label" for="password">Password *</label>
                        <div class="input-eye-wrapper">
                            <input type="password" id="password" th:field="*{password}" placeholder="••••••••" autocomplete="new-password">
                            <button type="button" class="eye-btn" onclick="toggleEye('password', this)" tabindex="-1" aria-label="Show/hide password">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <span class="text-danger" th:errors="*{password}"></span>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label class="field-label" for="confirmPassword">Confirm Password *</label>
                        <div class="input-eye-wrapper">
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" autocomplete="new-password">
                            <button type="button" class="eye-btn" onclick="toggleEye('confirmPassword', this)" tabindex="-1" aria-label="Show/hide password">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <span class="match-hint" id="matchHint"></span>
                    </div>

                    <!-- Strength bar — spans full width -->
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <div class="strength-bar-track">
                            <div class="strength-bar-fill" id="strengthFill"></div>
                        </div>
                        <span class="strength-label" id="strengthLabel">Password strength</span>
                    </div>

                    
                    <div class="form-group">
                         <label class="field-label" for="role">Role *</label>
                            <div class="select-wrapper">
                                <select id="role" th:field="*{role}">
                                    <option value="">— Select a role —</option>
                                    <option value="MANAGER">Manager</option>
                                    <option value="AGENT">Agent</option>
                                </select>
                            </div>
                            <span class="text-danger" th:errors="*{role}"></span>
                    </div>

                    <div class="form-group">
                          <label class="field-label" for="team">Team *</label>
                            <div class="select-wrapper">
                                <select id="team" th:field="*{team.id}">
                                    <option value="">— Select a team —</option>
                                    <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.name}"></option>
                                </select>
                            </div>
                            <span class="text-danger" th:errors="*{team}"></span>
                    </div>

                    <div class="form-group">
                        <label class="field-label">Status *</label>
                        <div class="radio-group">
                            <div class="radio-option is-active">
                                <input type="radio" id="statusActive" th:field="*{status}" value="true">
                                <label for="statusActive">Active</label>
                            </div>
                            <div class="radio-option is-active">
                                <input type="radio" id="statusInactive" th:field="*{status}" value="false">
                                <label for="statusInactive">Inactive</label>
                            </div>
                        </div>
                        <span class="text-danger" th:errors="*{status}"></span>
                    </div>

                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="window.location='/users'">Cancel</button>
                    <button type="submit" class="btn-primary">Add User</button>
                </div>
                
            </form>
        </div>
        <script>
        const pwInput     = document.getElementById('password');
        const confirmPw   = document.getElementById('confirmPassword');
        const strengthFill  = document.getElementById('strengthFill');
        const strengthLabel = document.getElementById('strengthLabel');
        const matchHint     = document.getElementById('matchHint');

        /* ── Show / hide eye ── */
        function toggleEye(inputId, btn) {
            const input = document.getElementById(inputId);
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            const icon = btn.querySelector('svg');
            icon.innerHTML = isHidden
                ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                   <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                   <line x1="1" y1="1" x2="23" y2="23"/>`
                : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        }

        /* ── Strength checker ── */
        pwInput.addEventListener('input', () => {
            const score = getStrength(pwInput.value);
            const levels = [
                { w: '0%',   color: '#e4e4e7', text: 'Password strength' },
                { w: '25%',  color: '#ef4444', text: 'Weak' },
                { w: '50%',  color: '#f97316', text: 'Fair' },
                { w: '75%',  color: '#eab308', text: 'Good' },
                { w: '100%', color: '#22c55e', text: 'Strong' },
            ];
            const lvl = levels[score];
            strengthFill.style.width      = lvl.w;
            strengthFill.style.background = lvl.color;
            strengthLabel.textContent     = lvl.text;
            strengthLabel.style.color     = score === 0 ? '#aaa' : lvl.color;
            checkMatch();
        });

        confirmPw.addEventListener('input', checkMatch);

        function getStrength(pw) {
            if (!pw) return 0;
            let s = 0;
            if (pw.length >= 8)          s++;
            if (/[A-Z]/.test(pw))        s++;
            if (/[0-9]/.test(pw))        s++;
            if (/[^A-Za-z0-9]/.test(pw)) s++;
            return s;
        }

        function checkMatch() {
            if (!confirmPw.value) { matchHint.textContent = ''; matchHint.className = 'match-hint'; return; }
            const ok = pwInput.value === confirmPw.value;
            matchHint.textContent = ok ? '✓ Passwords match' : '✗ Passwords do not match';
            matchHint.className   = 'match-hint ' + (ok ? 'ok' : 'fail');
        }

        /* ── Block submit if passwords don't match ── */
        document.getElementById('UserForm').addEventListener('submit', (e) => {
            if (!pwInput.value) {
                e.preventDefault();
                pwInput.focus();
                return;
            }
            if (pwInput.value !== confirmPw.value) {
                e.preventDefault();
                confirmPw.focus();
                matchHint.textContent = '✗ Passwords do not match';
                matchHint.className   = 'match-hint fail';
            }
        });
        </script>
    </body>
</html>
