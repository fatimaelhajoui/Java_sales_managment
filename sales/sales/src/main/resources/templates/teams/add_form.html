<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{main/layout}">

    <head>
        <title>Add New Team</title>
        <th:block layout:fragment="head">
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
            <style>
                /* body styles are controlled by layout.html — do not override here */

                .form-page-wrapper {
                    display: flex;
                    justify-content: center;
                    align-items: flex-start;
                    min-height: calc(100vh - 64px);
                    padding: 32px 20px;
                }

                .form-container {
                    background: white;
                    border-radius: 12px;
                    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
                    width: 100%;
                    max-width: 600px;
                    padding: 48px;
                    animation: slideUp 0.4s ease-out;
                }

                @keyframes slideUp {
                    from { opacity: 0; transform: translateY(20px); }
                    to   { opacity: 1; transform: translateY(0); }
                }

                .text-danger { color: red; font-style: italic; font-size: 12px; }

                .form-header { margin-bottom: 32px; }

                .form-header h1 {
                    font-size: 28px;
                    font-weight: 600;
                    color: #1a1a1a;
                    margin-bottom: 8px;
                }

                .form-header p { font-size: 14px; color: #666; }

                .form-group { margin-bottom: 24px; }

                .form-group label {
                    display: block;
                    font-size: 14px;
                    font-weight: 500;
                    color: #1a1a1a;
                    margin-bottom: 8px;
                }

                .form-group input,
                .form-group textarea {
                    width: 100%;
                    padding: 12px 14px;
                    font-size: 14px;
                    border: 1px solid #e0e0e0;
                    border-radius: 8px;
                    font-family: inherit;
                    transition: all 0.2s ease;
                    background: #fafafa;
                }

                .form-group input:focus,
                .form-group textarea:focus {
                    outline: none;
                    background: white;
                    border-color: #0066cc;
                    box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
                }

                .form-group textarea {
                    resize: vertical;
                    min-height: 100px;
                    font-family: inherit;
                }

                .form-actions {
                    display: flex;
                    gap: 12px;
                    margin-top: 32px;
                }

                .form-actions button {
                    flex: 1;
                    padding: 12px 20px;
                    font-size: 14px;
                    font-weight: 500;
                    border: none;
                    border-radius: 8px;
                    cursor: pointer;
                    transition: all 0.2s ease;
                }

                .btn-primary { background: #0066cc; color: white; }
                .btn-primary:hover { background: #0052a3; box-shadow: 0 4px 12px rgba(0,102,204,0.3); }
                .btn-primary:active { transform: scale(0.98); }
                .btn-secondary { background: #f0f0f0; color: #1a1a1a; }
                .btn-secondary:hover { background: #e0e0e0; }

                .error-text { color: #d32f2f; font-size: 12px; margin-top: 4px; display: none; }
                .error-text.show { display: block; }

                @media (max-width: 520px) {
                    .form-container { padding: 28px 20px; }
                }
            </style>
        </th:block>
    </head>

    <body>
        <th:block layout:fragment="page-title">Add Team</th:block>

        <div layout:fragment="content">
            <div class="form-page-wrapper">
                <div class="form-container">

                    <div class="form-header">
                        <h1>Add Team</h1>
                        <p>Create a new team in your organization</p>
                    </div>

                    <form id="teamForm" method="post" th:action="@{/teams/save}" th:object="${team}">
                        <div class="form-group">
                            <label for="teamName">Team Name *</label>
                            <input type="text" id="teamName" th:field="*{name}" placeholder="e.g. Sales North" required>
                            <div class="error-text" id="nameError">Team name is required</div>
                            <span class="text-danger" th:errors="*{name}"></span>
                        </div>

                        <div class="form-group">
                            <label for="teamNote">Notes</label>
                            <textarea id="teamNote" th:field="*{note}" placeholder="Optional notes about this team..."></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn-secondary" onclick="window.location='/teams'">Cancel</button>
                            <button type="submit" class="btn-primary">Add Team</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>

    </body>
</html>
